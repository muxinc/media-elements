<!DOCTYPE html>

<title>Spotify Audio Element - Mount / Unmount</title>
<meta name="viewport" content="width=device-width">

<style>
  body {
    margin: 20px auto;
    max-width: 800px;
    font-family: system-ui, sans-serif;
  }

  button {
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }

  #root {
    margin-top: 16px;
    min-height: 100px;
    border: 2px dashed #ccc;
    padding: 8px;
  }

  #root:empty::after {
    content: '(unmounted)';
    color: #999;
    display: block;
    text-align: center;
    padding: 40px;
  }

  spotify-audio {
    display: block;
    width: 100%;
    height: 152px;
  }

  #count {
    font-variant-numeric: tabular-nums;
  }
</style>

<h1>Spotify Audio Element - Mount / Unmount</h1>

<p>
  <button id="mount">Mount</button>
  <button id="unmount">Unmount</button>
  <span id="count">Cycles: 0</span>
</p>

<div id="root"></div>

<script type="module">
  import '../spotify-audio-element.js';

  const root = document.getElementById('root');
  let audio = null;
  let cycles = 0;

  function mount() {
    if (audio) return;

    audio = document.createElement('spotify-audio');
    audio.src = 'https://open.spotify.com/episode/7makk4oTQel546B0PZlDM5';
    audio.setAttribute('controls', '');

    console.log('mounted');

    root.appendChild(audio);
  }

  function unmount() {
    if (!audio) return;

    audio.remove();
    audio = null;
    cycles++;
    document.getElementById('count').textContent = `Cycles: ${cycles}`;
    console.log('unmounted', `(cycle ${cycles})`);
  }

  document.getElementById('mount').addEventListener('click', mount);
  document.getElementById('unmount').addEventListener('click', unmount);

  // Start unmounted for memory snapshot baseline.
</script>
