<!DOCTYPE html>

<title>Custom Media Element - Mount / Unmount</title>
<meta name="viewport" content="width=device-width">
<script type="module" src="./example.js"></script>

<style>
  body {
    margin: 20px auto;
    max-width: 800px;
    font-family: system-ui, sans-serif;
  }

  button {
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }

  #root {
    margin-top: 16px;
    min-height: 100px;
    border: 2px dashed #ccc;
    padding: 8px;
  }

  #root:empty::after {
    content: '(unmounted)';
    color: #999;
    display: block;
    text-align: center;
    padding: 40px;
  }

  my-video {
    display: block;
    width: 100%;
  }

  #count {
    font-variant-numeric: tabular-nums;
  }
</style>

<h1>Mount / Unmount</h1>

<p>
  <button id="mount">Mount</button>
  <button id="unmount">Unmount</button>
  <span id="count">Cycles: 0</span>
</p>

<div id="root"></div>

<script type="module">
  const root = document.getElementById('root');
  let video = null;
  let cycles = 0;

  function mount() {
    if (video) return;

    video = document.createElement('my-video');
    video.setAttribute('src', 'https://stream.mux.com/O6LdRc0112FEJXH00bGsN9Q31yu5EIVHTgjTKRkKtEq1k/medium.mp4');
    video.setAttribute('poster', 'https://image.mux.com/O6LdRc0112FEJXH00bGsN9Q31yu5EIVHTgjTKRkKtEq1k/thumbnail.webp');
    video.setAttribute('controls', '');
    video.setAttribute('muted', '');
    video.setAttribute('crossorigin', '');
    video.setAttribute('playsinline', '');

    root.appendChild(video);
    console.log('mounted');
  }

  function unmount() {
    if (!video) return;

    video.remove();
    video = null;
    cycles++;
    document.getElementById('count').textContent = `Cycles: ${cycles}`;
    console.log('unmounted', `(cycle ${cycles})`);
  }

  document.getElementById('mount').addEventListener('click', mount);
  document.getElementById('unmount').addEventListener('click', unmount);

  // Start unmounted for memory snapshot baseline.
</script>
