<!DOCTYPE html>

<title>Twitch Video Element - Mount / Unmount</title>
<meta name="viewport" content="width=device-width">

<style>
  body {
    margin: 20px auto;
    max-width: 800px;
    font-family: system-ui, sans-serif;
  }

  button {
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }

  #root {
    margin-top: 16px;
    min-height: 100px;
    border: 2px dashed #ccc;
    padding: 8px;
  }

  #root:empty::after {
    content: '(unmounted)';
    color: #999;
    display: block;
    text-align: center;
    padding: 40px;
  }

  twitch-video {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
  }

  #count {
    font-variant-numeric: tabular-nums;
  }
</style>

<h1>Twitch Video Element - Mount / Unmount</h1>

<p>
  <button id="mount">Mount</button>
  <button id="unmount">Unmount</button>
  <span id="count">Cycles: 0</span>
</p>

<div id="root"></div>

<script type="module">
  import '../twitch-video-element.js';

  const root = document.getElementById('root');
  let video = null;
  let cycles = 0;

  function mount() {
    if (video) return;

    video = document.createElement('twitch-video');
    video.src = 'https://www.twitch.tv/videos/106400740';
    video.setAttribute('controls', '');
    video.muted = true;

    console.log('mounted');

    root.appendChild(video);
  }

  function unmount() {
    if (!video) return;

    video.remove();
    video = null;
    cycles++;
    document.getElementById('count').textContent = `Cycles: ${cycles}`;
    console.log('unmounted', `(cycle ${cycles})`);
  }

  document.getElementById('mount').addEventListener('click', mount);
  document.getElementById('unmount').addEventListener('click', unmount);

  // Start unmounted for memory snapshot baseline.
</script>
